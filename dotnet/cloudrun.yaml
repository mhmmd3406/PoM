apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pom-b2b-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (cost optimisation)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # Only allow Firebase + internal traffic in production
        run.googleapis.com/vpc-access-egress: all-traffic
    spec:
      containerConcurrency: 80
      timeoutSeconds: 30
      serviceAccountName: pom-b2b-api@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: europe-west1-docker.pkg.dev/PROJECT_ID/pom/b2b-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Firebase__ProjectId
              value: PROJECT_ID
            # Credentials mounted from Secret Manager
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/sa-key.json
          volumeMounts:
            - name: sa-key
              mountPath: /secrets
              readOnly: true
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: sa-key
          secret:
            secretName: pom-b2b-sa-key
            items:
              - key: latest
                path: sa-key.json
