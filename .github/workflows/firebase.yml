name: Firebase Deploy

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "firestore/**"
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/firebase.yml"
  pull_request:
    paths:
      - "firestore/**"
      - "functions/**"

jobs:
  functions-test:
    name: Cloud Functions Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm test

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Integration tests (Firestore rules via emulator)
        run: |
          firebase emulators:exec \
            --only firestore \
            --project pom-test \
            "npm run test:integration"

  deploy:
    name: Deploy Firestore Rules + Functions
    runs-on: ubuntu-latest
    needs: functions-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        working-directory: functions
        run: npm ci --omit=dev

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules & indexes
        run: firebase deploy --only firestore --project ${{ vars.GCP_PROJECT_ID }} --non-interactive

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project ${{ vars.GCP_PROJECT_ID }} --non-interactive
