workflows:
  android-debug:
    name: PoM Android Debug APK
    max_build_duration: 30
    environment:
      flutter: stable
      java: 17
      groups:
        - pom_secrets  # must contain FCI_GOOGLE_SERVICES (base64-encoded google-services.json)
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - mobile/.dart_tool
    scripts:
      - name: Inject google-services.json
        script: echo "$FCI_GOOGLE_SERVICES" | base64 --decode > mobile/android/app/google-services.json
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: mobile
      - name: Run tests
        script: flutter test
        working_directory: mobile
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --dart-define=BYPASS_AUTH=true \
            --no-tree-shake-icons \
            --suppress-analytics
        working_directory: mobile
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - ozkanmuhammed8060@gmail.com
        notify:
          success: true
          failure: true

  android-release:
    name: PoM Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      groups:
        - pom_secrets  # must contain FCI_GOOGLE_SERVICES (base64-encoded google-services.json)
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - mobile/.dart_tool
    scripts:
      - name: Inject google-services.json
        script: echo "$FCI_GOOGLE_SERVICES" | base64 --decode > mobile/android/app/google-services.json
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: mobile
      - name: Run tests
        script: flutter test
        working_directory: mobile
      - name: Build release APK (obfuscated)
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --no-tree-shake-icons \
            --suppress-analytics
        working_directory: mobile
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-release.apk
      - mobile/build/symbols/
    publishing:
      email:
        recipients:
          - ozkanmuhammed8060@gmail.com
        notify:
          success: true
          failure: true
