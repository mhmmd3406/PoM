workflows:
  android-debug:
    name: PoM Android Debug APK
    max_build_duration: 30
    clone_depth: 1
    environment:
      flutter: 3.24.3
      java: 17
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - mobile/.dart_tool
        - mobile/build/app/outputs
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        working_directory: mobile
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --no-tree-shake-icons \
            --suppress-analytics
        working_directory: mobile
    artifacts:
      - mobile/build/app/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - placeholder@pom.app
        notify:
          success: true
          failure: true
