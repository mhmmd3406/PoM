name: pom_app
description: Peace of Mind - B2B Employee Wellbeing Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_crashlytics: ^4.1.0
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.7
  # Payments
  flutter_stripe: ^11.1.0
  # Charts
  fl_chart: ^0.69.0
  # Utils
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  intl: ^0.19.0
  http: ^1.2.2
  crypto: ^3.0.3
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
